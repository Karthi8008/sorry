<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorry da Udhaya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.3; }
      50% { transform: translateY(-55vh) translateX(20px) rotate(15deg); }
      100% { transform: translateY(-110vh) translateX(-15px) rotate(-10deg); opacity: 0; }
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(0.8); } 50% { opacity: 0.9; transform: scale(1.3); } }
    @keyframes shine { 0%, 100% { background-position: 0% center; } 50% { background-position: 100% center; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    @keyframes bar { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="relative min-h-screen bg-gradient-to-b from-rose-50 via-white to-purple-50 overflow-x-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const Icon = ({ name, ...props }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          window.lucide.createIcons({ attrs: props, nameAttr: 'data-lucide' });
        }
      }, [name]);
      return <i ref={ref} data-lucide={name} className={props.className}></i>;
    };

    const CONFIG = {
      herName: "Udhaya",
      yourName: "Karthi",
      hero: {
        eyebrow: "edhavadhu sollanum nu nenachen",
        headlinePrefix: "Hey",
        headlineSuffix: "romba sorry dii.",
        subtext: "Nama pesina convo full-a loop la replay pannitu irukken, oruye oru place la dhan land aaguren — na thappu pannitten, unaku athuku better treatment thevai irundhuchu. Konjam scroll pannu, unaku oru surprise vechirukken.",
      },
      memories: [
        { title: "ethu ne ennaku muthala kudutha chocolate", caption: "etha na yarukum kudukama nane saptan dii.",<img src: "cho.jpg"/> },
        { title: "ethu namba first msg pannapo", caption: "ethula la na unna vanga poonganu tha sollitu iruntha dii.",<img src: "msg.png"/>},
        { title: "ethu namba first photo", caption: "nee tha ella photo layum alazha thanu iruka natha sumaru.",<img src: "photo.png"/> },
        { title: "ethu na unnaku first msg la padunathu", caption: "nalla irukuma nu theriyama tha unnaku paduna cheloe.",<img src: "patu.mp4"/> },
      ],
      reasons:[
        { title: "Unoda andha sirippu dii", detail: "Enna thaan prachana irundhalum, un sirippa ketta podhum... en ulagam motham silent aypoga, adhu mattum thaan ketkume." },
        { title: "Enaku mukkiyam nu thonradhu", detail: "Naa casual-a solra chinna chinna vishayatha kooda nee nyabagam vechu seiyum bodhu, romba lucky-ah feel panna veikura da." },
        { title: "Unoda alagana kobam", detail: "Nee kobapadra andha nodi... konjam stubborn-ah face-a vechurupa paathiya, adhu mela enaku kovame varadhu, innum love jasthi aagum." },
        { title: "Unoda andha periya manasu", detail: "Naa thappu pannitu pesama irundha kooda, un ego-va pakama enakaaga vitu kuduthu varra paathiya... un heart romba perisu dii." },
        { title: "Nee kooda irukura andha time", detail: "Namma summadea pesitu irundhalum சரி, heavy prachana poitu irundhalum சரி... nee pakkathula irundha secure-ah feel aagum." },
        { title: "Innum en mela irukra care...", detail: "Ivlo sandai potum innum kovatha marandhu indha lines-a nee padikura paathiya... un pure love-ku edhuvume eedu aagadhu da. I promise I won't let you down." }
      ],
      song: { title: "Namma Pattu", artist: "always play aagura andha oru pattu", src: "" },
      finalMessage: "Naan senja thappa marandhu thiruppi enna nambunadhuku unaku epdi thanks solradhune theriyala da. I promise, ini un manasu valikura maadhiri nadanthuka maaten, innum adhigamaa unna purinju care pannupen. Endha oru prachanayum ivlo dhooram poga vidama appove pesi mudichidren. I love you so much da Udhaya.",
    };

    function AmbientBackground() {
      const hearts = useMemo(() => Array.from({ length: 12 }).map((_, i) => ({
        id: i, left: Math.random() * 100, size: 14 + Math.random() * 20, duration: 12 + Math.random() * 10, delay: Math.random() * 10
      })), []);
      return (
        <div className="pointer-events-none fixed inset-0 overflow-hidden z-0">
          <div className="absolute -top-32 -left-24 w-96 h-96 rounded-full bg-rose-200/30 blur-3xl" />
          <div className="absolute top-1/3 -right-24 w-80 h-80 rounded-full bg-purple-200/20 blur-3xl" />
          {hearts.map((h) => (
            <Icon name="heart" key={h.id} className="absolute text-rose-300 fill-rose-200" style={{ left: `${h.left}%`, bottom: "-10%", width: h.size, height: h.size, opacity: 0.25, animation: `floatUp ${h.duration}s ease-in ${h.delay}s infinite` }} />
          ))}
        </div>
      );
    }

    function Section({ id, eyebrow, title, children }) {
      return (
        <section id={id} className="relative z-10 py-16 px-6 max-w-5xl mx-auto">
          {eyebrow && <p className="text-center text-xs tracking-[0.2em] uppercase text-rose-400 font-medium mb-2">{eyebrow}</p>}
          {title && <h2 className="text-center text-3xl md:text-4xl mb-10 text-rose-950 font-serif" style={{ fontFamily: "'Playfair Display', serif" }}>{title}</h2>}
          {children}
        </section>
      );
    }

    function Hero() {
      const [mounted, setMounted] = useState(false);
      useEffect(() => { setMounted(true); }, []);
      return (
        <section className="relative z-10 min-h-[90vh] flex flex-col items-center justify-center text-center px-6 transition-all duration-700">
          <p className="text-xs tracking-[0.3em] uppercase text-rose-400 font-medium mb-4">{CONFIG.hero.eyebrow}</p>
          <h1 className="text-4xl sm:text-5xl md:text-6xl leading-tight text-rose-950 max-w-3xl font-serif" style={{ fontFamily: "'Playfair Display', serif" }}>
            {CONFIG.hero.headlinePrefix} <span className="italic text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-amber-400 bg-[length:200%_auto] animate-[shine_5s_infinite]">{CONFIG.herName}</span><br />{CONFIG.hero.headlineSuffix}
          </h1>
          <p className="mt-6 text-sm sm:text-base text-rose-900/70 max-w-xl leading-relaxed">{CONFIG.hero.subtext}</p>
          <div className="mt-8 flex items-center gap-2 text-rose-400">
            <Icon name="heart" className="w-4 h-4 fill-rose-300 animate-pulse" />
            <span className="text-xs tracking-widest uppercase">from {CONFIG.yourName} kooda love</span>
            <Icon name="heart" className="w-4 h-4 fill-rose-300 animate-pulse" />
          </div>
        </section>
      );
    }

    function MemoryCard({ memory }) {
      return (
        <div className="snap-center shrink-0 w-[75vw] sm:w-80 mx-2 bg-white/40 border border-white/60 backdrop-blur-md rounded-2xl shadow-sm p-4">
          <div className="h-44 bg-gradient-to-br from-rose-200 to-amber-100 rounded-xl flex items-center justify-center mb-4">
            <Icon name="camera" className="w-8 h-8 text-rose-400/60" />
          </div>
          <h3 className="text-base text-rose-950 font-medium font-serif" style={{ fontFamily: "'Playfair Display', serif" }}>{memory.title}</h3>
          <p className="mt-1 text-xs text-rose-900/70 leading-relaxed">{memory.caption}</p>
        </div>
      );
    }

    function MemoriesCarousel() {
      return (
        <Section id="memories" eyebrow="happy moments" title="Namma Konjam Memories">
          <div className="flex overflow-x-auto snap-x snap-mandatory pb-4 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
            {CONFIG.memories.map((m, i) => <MemoryCard key={i} memory={m} />)}
          </div>
        </Section>
      );
    }

    function FlipCard({ title, detail, index }) {
      const [flipped, setFlipped] = useState(false);
      return (
        <button onClick={() => setFlipped(!flipped)} className="text-left w-full h-40 bg-white/60 border border-rose-100 rounded-xl shadow-sm p-5 relative overflow-hidden transition-all duration-300 hover:scale-[1.02]">
          {!flipped ? (
            <div className="flex flex-col h-full justify-between">
              <Icon name="heart" className="w-5 h-5 text-rose-300 fill-rose-200 animate-[breathe_3s_infinite]" />
              <div>
                <p className="text-[10px] text-rose-400 uppercase tracking-widest">Reason 0{index + 1}</p>
                <h3 className="text-base text-rose-950 font-serif" style={{ fontFamily: "'Playfair Display', serif" }}>{title}</h3>
              </div>
            </div>
          ) : (
            <div className="flex items-center h-full text-xs text-rose-900/80 leading-relaxed animate-[fadeIn_0.3s]">{detail}</div>
          )}
        </button>
      );
    }

    function WhySpecialGrid() {
      return (
        <Section eyebrow="reminders" title="Nee Enakku ஏன் Special">
          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            {CONFIG.reasons.map((r, i) => <FlipCard key={i} title={r.title} detail={r.detail} index={i} />)}
          </div>
        </Section>
      );
    }

    function MelodyPlayer() {
      const audioRef = useRef(null);
      const [playing, setPlaying] = useState(false);
      const toggle = () => {
        if (!audioRef.current) return;
        playing ? audioRef.current.pause() : audioRef.current.play().catch(()=>{});
        setPlaying(!playing);
      };
      return (
        <Section eyebrow="play pattu" title="Unaku Oru Soft Pattu">
          <div className="max-w-md mx-auto bg-white/50 border border-white/70 backdrop-blur-md rounded-2xl p-6 text-center shadow-sm">
            <div className="w-16 h-16 mx-auto bg-gradient-to-tr from-rose-400 to-amber-200 rounded-full flex items-center justify-center mb-3 shadow" style={{ animation: playing ? 'spin 6s linear infinite' : 'none' }}>
              <Icon name="volume-2" className="w-6 h-6 text-white" />
            </div>
            <p className="text-base text-rose-950 font-serif" style={{ fontFamily: "'Playfair Display', serif" }}>{CONFIG.song.title}</p>
            <p className="text-xs text-rose-900/50 mb-4">{CONFIG.song.artist}</p>
            <button onClick={toggle} className="w-12 h-12 rounded-full bg-rose-500 text-white flex items-center justify-center mx-auto shadow shadow-rose-300">
              {playing ? <Icon name="pause" className="w-5 h-5" /> : <Icon name="play" className="w-5 h-5 ml-0.5" />}
            </button>
            {CONFIG.song.src ? <audio ref={audioRef} src={CONFIG.song.src} onEnded={() => setPlaying(false)} /> : <p className="text-[10px] text-rose-900/40 mt-3">(Add mp3 link in CONFIG to play)</p>}
          </div>
        </Section>
      );
    }

    function ForgiveMe() {
      const containerRef = useRef(null);
      const [noPos, setNoPos] = useState({ x: 0, y: 0 });
      const [dodges, setDodges] = useState(0);
      const [accepted, setAccepted] = useState(false);

      const dodge = () => {
        if (!containerRef.current) return;
        const box = containerRef.current;
        const x = (Math.random() - 0.5) * (box.offsetWidth - 100);
        const y = (Math.random() - 0.5) * (box.offsetHeight - 60);
        setNoPos({ x, y }); setDodges(dodges + 1);
      };

      const noLabel = dodges === 0 ? "Illa" : dodges < 3 ? "Wait, illa da" : dodges < 6 ? "En pinnadi வராதே 😅" : "Sari, Yes click pannu";

      return (
        <Section eyebrow="oru kelvi" title="Enna Forgive Pannuviya?">
          <div ref={containerRef} className="relative h-48 bg-white/40 border border-white/60 backdrop-blur-md rounded-2xl flex items-center justify-center gap-4 overflow-hidden shadow-sm">
            <button onClick={() => setAccepted(true)} className="px-5 py-2.5 rounded-full bg-gradient-to-r from-rose-500 to-pink-500 text-white text-xs font-medium shadow-md animate-[breathe_2.5s_infinite]">Aama, manasari manichitten 💗</button>
            <button onMouseEnter={dodge} onClick={dodge} style={{ transform: `translate(${noPos.x}px, ${noPos.y}px)` }} className="px-4 py-2.5 rounded-full bg-white/80 border border-rose-200 text-rose-500 text-xs font-medium shadow transition-transform duration-200 ease-out whitespace-nowrap">{noLabel}</button>
          </div>
          {accepted && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-rose-950/20 backdrop-blur-sm animate-[fadeIn_0.3s]">
              <div className="max-w-sm w-full bg-white/95 border shadow-xl rounded-2xl p-6 text-center animate-[popIn_0.4s]">
                <Icon name="sparkles" className="w-7 h-7 text-amber-400 mx-auto mb-3" />
                <h3 className="text-xl text-rose-950 mb-2 font-serif" style={{ fontFamily: "'Playfair Display', serif" }}>Thanks da, {CONFIG.herName}.</h3>
                <p className="text-rose-900/70 text-xs leading-relaxed">{CONFIG.finalMessage}</p>
                <button onClick={() => setAccepted(false)} className="mt-4 text-xs font-medium text-rose-500 underline">Close</button>
              </div>
            </div>
          )}
        </Section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <AmbientBackground />
          <main className="relative z-10 pb-10">
            <Hero />
            <MemoriesCarousel />
            <WhySpecialGrid />
            <MelodyPlayer />
            <ForgiveMe />
          </main>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
